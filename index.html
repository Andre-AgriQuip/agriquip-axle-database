<!DOCTYPE html>
<html>
<head>
  <title>AgriQuip Axle Bracket Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      background-color: #2c7;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #1a5;
    }
    h2 {
      margin-top: 40px;
    }
  </style>
</head>
<body>

<h1>AgriQuip Axle Bracket Finder</h1>

<!-- ================= UPLOAD ================= -->
<h2>Upload File to Tractor</h2>

<input id="uploadBrand" placeholder="Brand (e.g. John Deere)">
<input id="uploadModel" placeholder="Model (e.g. 6155R)">
<input type="file" id="fileInput">

<button onclick="uploadFile()">Upload</button>

<p id="uploadStatus"></p>

<!-- ================= VIEW FILES ================= -->
<h2>View Files for Tractor</h2>

<input id="viewBrand" placeholder="Brand (e.g. John Deere)">
<input id="viewModel" placeholder="Model (e.g. 6155R)">

<button onclick="loadFiles()">Load Files</button>

<ul id="fileList"></ul>

<script>
function safeText(text) {
  return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ================= UPLOAD =================
async function uploadFile() {
  const brand = document.getElementById('uploadBrand').value;
  const model = document.getElementById('uploadModel').value;
  const file = document.getElementById('fileInput').files[0];
  const status = document.getElementById('uploadStatus');

  if (!brand || !model || !file) {
    status.innerText = 'Please enter brand, model, and select a file.';
    return;
  }

  status.innerText = 'Uploading...';

  try {
    const response = await fetch('/api/upload', {
      method: 'POST',
      headers: {
        'x-tractor-brand': brand,
        'x-tractor-model': model,
        'x-file-name': file.name
      },
      body: file
    });

    const result = await response.json();

    if (!response.ok) {
      status.innerText = result.error || 'Upload failed';
      return;
    }

    status.innerHTML = `
      Uploaded successfully!<br>
      <a href="${result.url}" target="_blank">View File</a>
    `;
  } catch (err) {
    status.innerText = 'Upload error';
  }
}

// ================= LOAD FILES =================
async function loadFiles() {
  const brand = document.getElementById('viewBrand').value;
  const model = document.getElementById('viewModel').value;
  const fileList = document.getElementById('fileList');

  if (!brand || !model) {
    fileList.innerHTML = '<li>Please enter brand and model</li>';
    return;
  }

  fileList.innerHTML = 'Loading...';

  try {
    const response = await fetch(`/api/files?brand=${encodeURIComponent(brand)}&model=${encodeURIComponent(model)}`);
    const files = await response.json();

    if (!response.ok) {
      fileList.innerHTML = `<li>${files.error || 'Error loading files'}</li>`;
      return;
    }

    if (!files.length) {
      fileList.innerHTML = '<li>No files uploaded yet.</li>';
      return;
    }

    fileList.innerHTML = files.map(file => {
      const name = file.pathname.split('/').pop();
      return `<li><a href="${file.url}" target="_blank">${safeText(name)}</a></li>`;
    }).join('');

  } catch (err) {
    fileList.innerHTML = '<li>Error loading files</li>';
  }
}
</script>

</body>
</html>
